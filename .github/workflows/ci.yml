name: FlowDelta CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Unit + integration tests
  # -----------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          # No real key needed – LLM calls fall back to heuristic mode
          OPENAI_API_KEY: "ci-placeholder"
          NVIDIA_API_KEY: "ci-placeholder"
        run: pytest tests/ -v --tb=short --timeout=60

  # -----------------------------------------------------------------------
  # Job 2: FlowDelta pipeline smoke test
  # -----------------------------------------------------------------------
  pipeline-smoke:
    name: Pipeline smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run sample pipeline
        env:
          OPENAI_API_KEY: "ci-placeholder"
          NVIDIA_API_KEY: "ci-placeholder"
        run: python examples/sample_app/run_flows.py

      - name: Verify generated test file exists
        run: test -f generated_tests/test_checkout.py

      - name: Run generated tests (structural check only)
        run: pytest generated_tests/ --collect-only -q || true

      - name: Upload generated tests artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-tests
          path: generated_tests/
          retention-days: 7

  # -----------------------------------------------------------------------
  # Job 3: Mutation testing (on main branch only)
  # -----------------------------------------------------------------------
  mutation:
    name: Mutation testing
    runs-on: ubuntu-latest
    needs: pipeline-smoke
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies + mutmut
        run: |
          pip install -e ".[dev]"
          pip install mutmut

      - name: Run pipeline to generate tests
        env:
          OPENAI_API_KEY: "ci-placeholder"
          NVIDIA_API_KEY: "ci-placeholder"
        run: python examples/sample_app/run_flows.py

      - name: Run FlowDelta mutation check
        env:
          OPENAI_API_KEY: "ci-placeholder"
          NVIDIA_API_KEY: "ci-placeholder"
        run: |
          python - <<'EOF'
          from src.test_generator.mutation_runner import MutationRunner

          runner = MutationRunner(
              source_file="examples/sample_app/ecommerce.py",
              test_file="generated_tests/test_checkout.py",
              backend="builtin",
              threshold=0.5,
          )
          report, suggestions = runner.feedback_loop()
          print(report.summary())

          # Save report as JSON artifact
          import json, pathlib
          pathlib.Path("mutation_report.json").write_text(
              json.dumps(report.to_dict(), indent=2)
          )

          if suggestions:
              print("\nImprovement suggestions:")
              for s in suggestions[:5]:
                  print(s)
          EOF

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: mutation_report.json
          retention-days: 30

  # -----------------------------------------------------------------------
  # Job 4: Invariant + property-based test generation check
  # -----------------------------------------------------------------------
  sprint3-checks:
    name: Sprint 3 – Invariants & Property Tests
    runs-on: ubuntu-latest
    needs: pipeline-smoke

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pipeline
        env:
          OPENAI_API_KEY: "ci-placeholder"
          NVIDIA_API_KEY: "ci-placeholder"
        run: python examples/sample_app/run_flows.py

      - name: Run invariant + property-based test generation
        env:
          OPENAI_API_KEY: "ci-placeholder"
          NVIDIA_API_KEY: "ci-placeholder"
        run: |
          python - <<'EOF'
          import sys, json
          sys.path.insert(0, ".")
          from src.state_tracker.trace_recorder import SysTraceRecorder, FlowTrace
          from src.delta_engine.state_diff import StateDiffer
          from src.test_generator.invariant_detector import InvariantDetector
          from src.test_generator.hypothesis_gen import HypothesisTestGenerator

          # Re-run checkout flow for invariant detection
          sys.path.insert(0, "examples/sample_app")
          from ecommerce import checkout, ProductDB

          db = ProductDB()
          db.add("p001", "Laptop", 999.99, 10)
          db.add("p002", "Headphones", 49.99, 20)

          recorder = SysTraceRecorder(
              watch_functions={"checkout", "build_cart", "apply_coupon", "process_payment", "create_order"},
          )
          recorder.record(checkout, user_id="ci-user", product_quantities={"p001": 1}, coupon="SAVE10", db=db)

          from src.state_tracker.trace_recorder import FlowTrace
          trace = FlowTrace(flow_id="checkout", run_id="ci-run", snapshots=recorder.snapshots)

          differ = StateDiffer()
          td = differ.diff_trace(trace)

          # Invariants
          detector = InvariantDetector()
          invariants = detector.detect(trace)
          print(f"Detected {len(invariants)} invariants:")
          for inv in invariants:
              print(f"  {inv.kind}: {inv.variable} = {inv.observed_value!r}")

          # Property test file
          gen = HypothesisTestGenerator()
          spec = gen.generate(td, invariants)
          out = gen.render(spec, output_dir="generated_tests")
          print(f"\nProperty test file: {out}")
          EOF

      - name: Verify property test file
        run: test -f generated_tests/test_property_checkout.py

      - name: Upload Sprint 3 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sprint3-outputs
          path: generated_tests/
          retention-days: 7
